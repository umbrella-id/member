<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Info - Umbrella</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/kas.css" />
    <link rel="stylesheet" href="css/crysta.css" />
    <link rel="stylesheet" href="css/saran.css" />
</head>
<body>

    <!-- ===== FLOATING MENU ===== -->
    <div class="menu-float" id="menuToggle" aria-label="Menu">
        <i class="fas fa-bars"></i>
    </div>

    <!-- ===== FLOATING MENU PANEL ===== -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="menu-panel" id="menuPanel">
        <button class="close-btn" id="menuClose"><i class="fas fa-times"></i></button>
        <ul>
            <li class="active" data-page="laporan"> <i class="fas fa-file-invoice"></i> Laporan Kas</li>
            <li data-page="crysta">
                <span class="menu-icon-wrapper"></span>
                Daftar Crysta
            </li>
            <li data-page="saran"><i class="fas fa-envelope"></i> Kotak Saran</li>
        </ul>
    </div>

    <!-- ===== KONTEN UTAMA ===== -->
    <div class="main-content" id="mainContent">
        <!-- Konten akan diisi oleh masing-masing menu -->
    </div>

    <!-- ===== TOAST (untuk saran) ===== -->
    <div class="toast-message" id="toastMessage"></div>

    <!-- ===== JAVASCRIPT ===== -->
    <script src="js/crysta-icons.js"></script> 
    <script src="js/app.js"></script>
    <script src="js/kas.js"></script>
    <script src="js/crysta.js"></script>
    <script src="js/saran.js"></script>
</body>
</html>
