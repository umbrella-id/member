<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Event - Lomba Mancing Duo Hoki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0a1a;
            color: #e2d9f3;
            padding: 12px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 20px;
        }
        
        .card {
            background: #1a1228;
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid #2d1f4a;
        }
        
        .brosur-image {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #2d1f4a;
            display: block;
        }
        
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #c4b5e3;
            margin-bottom: 8px;
        }
        
        /* ===== PESERTA GRID ===== */
        .peserta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 4px 0;
        }
        .peserta-item {
            background: #0f0a1a;
            border: 1px solid #2d1f4a;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            color: #c4b5e3;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .peserta-item .num { color: #4a3a6a; font-size: 11px; }
        .peserta-item .nama { font-weight: 500; }
        
        /* ===== TIM ITEM ===== */
        .tim-item {
            background: #0f0a1a;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            border: 1px solid #2d1f4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tim-item .info .name { font-size: 14px; font-weight: 600; color: #e2d9f3; }
        .tim-item .info .anggota { font-size: 12px; color: #7c6a9e; }
        .tim-item.pop {
            animation: pop 0.5s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* ===== PEMENANG ===== */
        .pemenang { text-align: center; padding: 10px 0; }
        .pemenang .juara { font-size: 24px; font-weight: 800; color: #f59e0b; }
        .pemenang .juara-2 { font-size: 20px; font-weight: 700; color: #a78bfa; margin-top: 8px; }
        .pemenang .detail { font-size: 13px; color: #7c6a9e; margin-top: 4px; }
        .pemenang .trophy { font-size: 48px; margin-bottom: 8px; }
        .pemenang .seri-text { font-size: 16px; color: #f59e0b; font-weight: 700; }
        
        /* ===== ANIMASI HACKING ===== */
        .animasi-container {
            text-align: center;
            padding: 30px 0 20px 0;
        }
        .animasi-container .hack-text {
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #7c3aed;
            letter-spacing: 4px;
            background: #0f0a1a;
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid #2d1f4a;
            display: inline-block;
            min-width: 280px;
            min-height: 70px;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }
        .animasi-container .hack-text .glow {
            animation: glowPulse 0.3s infinite alternate;
        }
        @keyframes glowPulse {
            0% { opacity: 0.6; text-shadow: 0 0 10px rgba(124, 58, 237, 0.2); }
            100% { opacity: 1; text-shadow: 0 0 30px rgba(124, 58, 237, 0.6); }
        }
        .animasi-container .hack-sub {
            font-size: 14px;
            color: #7c6a9e;
            margin-top: 12px;
            letter-spacing: 2px;
        }
        .animasi-container .hack-sub .dot {
            animation: dotAnim 1.2s infinite;
        }
        .animasi-container .hack-sub .dot:nth-child(2) { animation-delay: 0.4s; }
        .animasi-container .hack-sub .dot:nth-child(3) { animation-delay: 0.8s; }
        @keyframes dotAnim {
            0%, 20% { opacity: 0; }
            40%, 100% { opacity: 1; }
        }
        .animasi-container .progress {
            width: 70%;
            height: 3px;
            background: #2d1f4a;
            border-radius: 4px;
            margin: 20px auto 0;
            overflow: hidden;
        }
        .animasi-container .progress .bar {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            width: 0%;
            border-radius: 4px;
            animation: loading 3s ease forwards;
        }
        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .hidden { display: none !important; }
        .empty-state {
            color: #4a3a6a;
            text-align: center;
            padding: 16px 0;
            font-size: 14px;
        }
        
        @media (max-width: 400px) {
            .animasi-container .hack-text { font-size: 20px; padding: 12px 16px; min-width: 200px; min-height: 56px; }
            .tim-item { flex-wrap: wrap; }
            .peserta-item { font-size: 12px; padding: 3px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- GAMBAR BROSUR -->
        <div class="card" style="padding: 8px;">
            <img class="brosur-image" 
                 src="https://github.com/umbrella-id/member/blob/main/event%20mancing%20-%20duo.jpeg?raw=true" 
                 alt="Brosur Event Mancing Duo Hoki"
                 onerror="this.parentElement.style.display='none'">
        </div>

        <!-- KONTEN UTAMA -->
        <div class="card">
            <!-- SECTION: PESERTA (tahap pendaftaran) -->
            <div id="sectionPeserta">
                <div class="section-title">📋 Daftar Peserta</div>
                <div id="listPeserta"><div class="empty-state">Belum ada peserta</div></div>
            </div>

            <!-- ANIMASI PAIRING -->
            <div id="sectionAnimasiPairing" class="hidden">
                <div class="section-title">🎰 Mengacak...</div>
                <div class="animasi-container">
                    <div class="hack-text" id="hackDisplay">
                        <span class="glow">⧫</span> <span class="glow">⧫</span> <span class="glow">⧫</span>
                    </div>
                    <div class="hack-sub">
                        MEMBUAT TIM<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
                    </div>
                    <div class="progress"><div class="bar"></div></div>
                </div>
            </div>

            <!-- SECTION: PAIRING (tahap event berjalan) -->
            <div id="sectionPairing" class="hidden">
                <div class="section-title">🎣 Pembagian Tim</div>
                <div id="listTim"><div class="empty-state">Belum ada tim</div></div>
            </div>

            <!-- ANIMASI HASIL -->
            <div id="sectionAnimasiHasil" class="hidden">
                <div class="section-title">📊 Menghitung...</div>
                <div class="animasi-container">
                    <div class="hack-text" id="hackHasilDisplay">
                        <span class="glow">⧫</span> <span class="glow">⧫</span> <span class="glow">⧫</span>
                    </div>
                    <div class="hack-sub">
                        MENGHITUNG HASIL<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
                    </div>
                    <div class="progress"><div class="bar"></div></div>
                </div>
            </div>

            <!-- SECTION: HASIL (tahap selesai) -->
            <div id="sectionHasil" class="hidden">
                <div class="section-title">🏆 Hasil Akhir</div>
                <div id="pemenangContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        var API_URL = 'https://script.google.com/macros/s/AKfycbyDskJFdamlC5pAoyW8SfLTVCQ2MQNm_cz1g3sbvTfYeQW4es1TwpH3C1J5YhnWf146/exec';
        var previousData = null;
        var isAnimasiPairingRunning = false;
        var isAnimasiHasilRunning = false;

        // ===== DOM REFS =====
        var $ = function(id) { return document.getElementById(id); };
        var listPeserta = $('listPeserta');
        var listTim = $('listTim');
        var sectionPeserta = $('sectionPeserta');
        var sectionAnimasiPairing = $('sectionAnimasiPairing');
        var sectionPairing = $('sectionPairing');
        var sectionAnimasiHasil = $('sectionAnimasiHasil');
        var sectionHasil = $('sectionHasil');
        var pemenangContainer = $('pemenangContainer');
        var hackDisplay = $('hackDisplay');
        var hackHasilDisplay = $('hackHasilDisplay');

        // ===== SIMPAN DATA SEBELUMNYA =====
        var lastPeserta = null;
        var lastTim = null;

        // ===== CHARACTER SET =====
        var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/';
        var specialChars = '⧫✦✧◆◇⍟✦';

        // ===== HELPER =====
        function shuffleArray(array) {
            var arr = array.slice();
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr;
        }

        function getRandomChar() {
            return chars[Math.floor(Math.random() * chars.length)];
        }

        function getRandomSpecial() {
            return specialChars[Math.floor(Math.random() * specialChars.length)];
        }

        // ===== ANIMASI HACKING =====
        function startHackingAnimation(displayEl, duration, callback) {
            var count = 0;
            var maxCount = 20 + Math.floor(Math.random() * 10);
            var interval = setInterval(function() {
                count++;
                var text = '';
                var length = 5 + Math.floor(Math.random() * 4);
                for (var i = 0; i < length; i++) {
                    if (i === 0 && Math.random() > 0.7) {
                        text += getRandomSpecial();
                    } else {
                        text += getRandomChar();
                    }
                    if (i < length - 1 && Math.random() > 0.5) {
                        text += ' ';
                    }
                }
                displayEl.innerHTML = '<span class="glow">' + text + '</span>';
                
                if (count >= maxCount) {
                    clearInterval(interval);
                    displayEl.innerHTML = '<span class="glow">✦ ✦ ✦</span>';
                    if (callback) callback();
                }
            }, 80);
        }

        // ===== ANIMASI PAIRING =====
        function startAnimasiPairing() {
            if (isAnimasiPairingRunning) return;
            isAnimasiPairingRunning = true;

            sectionPeserta.classList.add('hidden');
            sectionAnimasiPairing.classList.remove('hidden');
            sectionPairing.classList.add('hidden');
            sectionAnimasiHasil.classList.add('hidden');
            sectionHasil.classList.add('hidden');

            startHackingAnimation(hackDisplay, 3000, function() {
                setTimeout(function() {
                    isAnimasiPairingRunning = false;
                    loadData();
                }, 300);
            });
        }

        // ===== ANIMASI HASIL =====
        function startAnimasiHasil() {
            if (isAnimasiHasilRunning) return;
            isAnimasiHasilRunning = true;

            sectionPeserta.classList.add('hidden');
            sectionAnimasiPairing.classList.add('hidden');
            sectionPairing.classList.add('hidden');
            sectionAnimasiHasil.classList.remove('hidden');
            sectionHasil.classList.add('hidden');

            startHackingAnimation(hackHasilDisplay, 3000, function() {
                setTimeout(function() {
                    isAnimasiHasilRunning = false;
                    loadData();
                }, 300);
            });
        }

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                var res = await fetch(API_URL + '?action=getData');
                var result = await res.json();
                if (result.status === 'success') {
                    var data = result.data;
                    var newStatus = data.status || 'pendaftaran';

                    if (previousData) {
                        if (previousData.status === 'pendaftaran' && newStatus === 'penjurian') {
                            if (!isAnimasiPairingRunning && !isAnimasiHasilRunning) {
                                previousData = data;
                                startAnimasiPairing();
                                return;
                            }
                        }
                        if (previousData.status === 'penjurian' && newStatus === 'selesai') {
                            if (!isAnimasiHasilRunning && !isAnimasiPairingRunning) {
                                previousData = data;
                                startAnimasiHasil();
                                return;
                            }
                        }
                    }

                    previousData = data;
                    renderData(data);
                }
            } catch(e) {
                // silent
            }
        }

        // ===== RENDER =====
        function renderData(data) {
            if (isAnimasiPairingRunning || isAnimasiHasilRunning) {
                return;
            }

            updateSection(data);
            updatePeserta(data.peserta || []);
            updateTim(data.tim || []);
            updatePemenang(data.tim || []);
        }

        // ===== UPDATE SECTION =====
        function updateSection(data) {
            if (data.status === 'pendaftaran') {
                sectionPeserta.classList.remove('hidden');
                sectionAnimasiPairing.classList.add('hidden');
                sectionPairing.classList.add('hidden');
                sectionAnimasiHasil.classList.add('hidden');
                sectionHasil.classList.add('hidden');
            } else if (data.status === 'penjurian') {
                sectionPeserta.classList.add('hidden');
                sectionAnimasiPairing.classList.add('hidden');
                sectionPairing.classList.remove('hidden');
                sectionAnimasiHasil.classList.add('hidden');
                sectionHasil.classList.add('hidden');
            } else if (data.status === 'selesai') {
                sectionPeserta.classList.add('hidden');
                sectionAnimasiPairing.classList.add('hidden');
                sectionPairing.classList.add('hidden');
                sectionAnimasiHasil.classList.add('hidden');
                sectionHasil.classList.remove('hidden');
            }
        }

        // ===== UPDATE PESERTA =====
        function updatePeserta(peserta) {
            if (!peserta || peserta.length === 0) {
                listPeserta.innerHTML = '<div class="empty-state">Belum ada peserta</div>';
                return;
            }

            var current = JSON.stringify(peserta);
            if (current === lastPeserta) return;
            lastPeserta = current;

            var html = '<div class="peserta-grid">';
            peserta.forEach(function(nama, i) {
                html += '<span class="peserta-item">';
                html += '<span class="num">' + (i+1) + '.</span>';
                html += '<span class="nama">' + nama + '</span>';
                html += '</span>';
            });
            html += '</div>';
            listPeserta.innerHTML = html;
        }

        // ===== UPDATE TIM - HANYA TIM YANG PUNYA ANGGOTA =====
        function updateTim(tim) {
            // Filter tim yang memiliki anggota (array tidak kosong)
            var timWithMembers = tim.filter(function(t) {
                return t.anggota && Array.isArray(t.anggota) && t.anggota.length > 0;
            });

            if (!timWithMembers || timWithMembers.length === 0) {
                listTim.innerHTML = '<div class="empty-state">Belum ada tim</div>';
                return;
            }

            var current = JSON.stringify(timWithMembers);
            if (current === lastTim) return;
            lastTim = current;

            var html = '';
            timWithMembers.forEach(function(t, idx) {
                var isAdmin = t.anggota && t.anggota.indexOf('Admin') !== -1;
                var anggotaText = t.anggota ? t.anggota.join(' & ') : '?';
                var popClass = (idx < 3) ? ' pop' : '';

                html += '<div class="tim-item' + popClass + '">';
                html += '<div class="info">';
                html += '<div class="name">Tim #' + t.id + (isAdmin ? '*' : '') + '</div>';
                html += '<div class="anggota">👥 ' + anggotaText + '</div>';
                html += '</div>';
                html += '</div>';
            });
            listTim.innerHTML = html;
        }

        // ===== UPDATE PEMENANG - HANYA TIM YANG PUNYA ANGGOTA =====
        function updatePemenang(tim) {
            // Filter tim yang memiliki anggota
            var timWithMembers = tim.filter(function(t) {
                return t.anggota && Array.isArray(t.anggota) && t.anggota.length > 0;
            });

            if (!timWithMembers || timWithMembers.length === 0) {
                pemenangContainer.innerHTML = '<div class="empty-state">Belum ada data</div>';
                return;
            }

            var valid = timWithMembers.filter(function(t) { 
                return t.terbesar !== null && t.terkecil !== null && t.selisih !== null; 
            });
            
            if (valid.length === 0) {
                pemenangContainer.innerHTML = '<div class="empty-state">Belum ada data lengkap</div>';
                return;
            }

            valid.sort(function(a, b) {
                if (b.selisih !== a.selisih) return b.selisih - a.selisih;
                return a.terkecil - b.terkecil;
            });

            var groups = [];
            var currentGroup = null;
            valid.forEach(function(t) {
                if (!currentGroup) {
                    currentGroup = { selisih: t.selisih, terkecil: t.terkecil, tims: [t] };
                } else if (t.selisih === currentGroup.selisih && t.terkecil === currentGroup.terkecil) {
                    currentGroup.tims.push(t);
                } else {
                    groups.push(currentGroup);
                    currentGroup = { selisih: t.selisih, terkecil: t.terkecil, tims: [t] };
                }
            });
            if (currentGroup) groups.push(currentGroup);

            var isSeriJuara1 = false, isSeriJuara2 = false;
            var juara1Group = null, juara2Group = null;
            if (groups.length >= 1) {
                var g1 = groups[0];
                if (g1.tims.length > 1) {
                    isSeriJuara1 = true;
                } else {
                    juara1Group = g1;
                    if (groups.length >= 2) {
                        var g2 = groups[1];
                        if (g2.tims.length > 1) {
                            isSeriJuara2 = true;
                            juara2Group = g2;
                        } else {
                            juara2Group = g2;
                        }
                    }
                }
            }

            var html = '<div class="pemenang">';
            if (isSeriJuara1) {
                html += '<div class="trophy">⚖️</div>';
                html += '<div class="seri-text">HASIL SERI</div>';
                html += '<div class="detail">Tidak ada Juara 1 & 2 karena SERI di posisi teratas</div>';
                html += '<div style="margin-top:8px; font-size:14px; color:#a78bfa;">Tim dengan data sama:</div>';
                groups[0].tims.forEach(function(t) {
                    html += '<div style="font-size:16px; font-weight:600; margin:4px 0;">' + (t.anggota ? t.anggota.join(' & ') : '') + '</div>';
                });
                html += '<div class="detail">Selisih: ' + groups[0].selisih + ' | Terkecil: ' + groups[0].terkecil + '</div>';
            } else {
                if (juara1Group) {
                    html += '<div class="trophy">🏆</div>';
                    html += '<div class="juara">🥇 Juara 1</div>';
                    juara1Group.tims.forEach(function(t) {
                        html += '<div style="font-size:20px; font-weight:700; margin:4px 0;">' + (t.anggota ? t.anggota.join(' & ') : '') + '</div>';
                        html += '<div class="detail">Terbesar: ' + t.terbesar + ' | Terkecil: ' + t.terkecil + '</div>';
                        html += '<div class="detail" style="font-weight:700; color:#10b981; font-size:18px;">Selisih: ' + t.selisih + '</div>';
                    });
                }
                if (juara2Group) {
                    html += '<div style="margin-top:16px; padding-top:16px; border-top:1px solid #2d1f4a;">';
                    if (isSeriJuara2) {
                        html += '<div class="juara-2">🥈 Juara 2 (SERI)</div>';
                        html += '<div class="detail">⚖️ SERI antara ' + juara2Group.tims.length + ' tim</div>';
                    } else {
                        html += '<div class="juara-2">🥈 Juara 2</div>';
                    }
                    juara2Group.tims.forEach(function(t) {
                        html += '<div style="font-size:18px; font-weight:600; margin:4px 0;">' + (t.anggota ? t.anggota.join(' & ') : '') + '</div>';
                        html += '<div class="detail">Terbesar: ' + t.terbesar + ' | Terkecil: ' + t.terkecil + '</div>';
                        html += '<div class="detail" style="font-weight:600; color:#10b981;">Selisih: ' + t.selisih + '</div>';
                    });
                    html += '</div>';
                }
            }

            html += '<div style="margin-top:16px; padding-top:16px; border-top:1px solid #2d1f4a; text-align:left;">';
            html += '<div style="font-weight:600; font-size:14px; color:#a78bfa; margin-bottom:8px;">📊 Semua Tim</div>';
            groups.forEach(function(group, idx) {
                var isSeri = group.tims.length > 1;
                var label = '';
                if (isSeriJuara1) label = '⚖️ SERI';
                else if (idx === 0) label = '🥇 Juara 1';
                else if (idx === 1) label = isSeri ? '🥈⚖️ Juara 2 (SERI)' : '🥈 Juara 2';
                else label = (idx + 1) + '. Peringkat';

                html += '<div style="padding:6px 0; border-bottom:1px solid #2d1f4a; font-size:13px;">';
                html += '<div style="display:flex; justify-content:space-between; color:#c4b5e3;">';
                html += '<span>' + label + '</span>';
                html += '<span style="color:#7c6a9e;">Selisih: ' + group.selisih + ' | Terkecil: ' + group.terkecil + '</span>';
                html += '</div>';
                group.tims.forEach(function(t) {
                    html += '<div style="color:#7c6a9e; font-size:12px; padding-left:12px;">';
                    html += '👥 ' + (t.anggota ? t.anggota.join(' & ') : '');
                    html += ' | ' + t.terbesar + ' - ' + t.terkecil;
                    html += '</div>';
                });
                html += '</div>';
            });
            html += '</div></div>';
            pemenangContainer.innerHTML = html;
        }

        // ===== POLLING (tetap jalan untuk update tim baru) =====
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
